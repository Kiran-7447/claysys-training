<!DOCTYPE html>
<html>
<head>
    <title>Image to Video</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- IMAGE -->
    <img id="myImage" src="auto-expo.jpeg" class="media">

    <!-- MAIN BUTTON -->
    <button id="mainBtn" class="bang-btn" onclick="showVideo()">
        🔥 Click to see the BANG
    </button>

    <!-- VIDEO -->
    <video id="myVideo" class="media" style="display:none;">
        <source src="video.mp4" type="video/mp4">
    </video>

    <!-- CONTROL BUTTONS -->
    <div id="controls" class="controls" style="display:none;">
        <button class="control-btn replay" onclick="replayVideo()">Replay</button>

        <button id="pauseBtn" class="control-btn pause" onclick="toggleVideo()">
            Pause
        </button>

        <button class="control-btn back" onclick="goBack()">Back</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
